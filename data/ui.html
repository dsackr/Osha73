<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>E-Paper Control</title>
<style>
body{font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;margin:0;background:#121212;color:#e0e0e0;line-height:1.6}.container{max-width:600px;margin:0 auto;padding:20px}
.card{background:#1e1e1e;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 4px 6px rgba(0,0,0,0.3)}h1{text-align:center;color:#ff9800;margin-top:0}h2{color:#ff9800;font-size:1.2em;margin-top:0}
label{display:block;margin:12px 0 6px;font-weight:600;color:#bbb}input[type=text],input[type=number],select{width:100%;padding:12px;border-radius:8px;border:1px solid #333;background:#252525;color:#fff;box-sizing:border-box;font-size:16px}
button{padding:12px 20px;background:#2196f3;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:16px;transition:background 0.2s}button:hover{background:#1976d2}
.row{display:flex;gap:10px;margin-top:10px}.row button{flex:1}.status-bar{display:flex;justify-content:space-between;font-size:0.9em;color:#888;margin-bottom:10px}
.btn-danger{background:#f44336} .btn-danger:hover{background:#d32f2f} .btn-success{background:#4caf50} .btn-success:hover{background:#388e3c}
.small{font-size:0.8em;color:#777;margin-top:4px}
#library-list{margin-top:10px} .lib-item{display:flex;justify-content:space-between;align-items:center;padding:10px;background:#252525;border-radius:8px;margin-bottom:8px;border:1px solid #333}
</style>
</head>
<body><div class="container">
<h1>E-Paper Control</h1>

<div class="card">
    <div class="status-bar"><span id="battery">Bat: --%</span><span id="ip">IP: --</span></div>
    <div id="session-timer" style="text-align:center;font-weight:bold;color:#ff9800;margin-bottom:10px">WiFi active: --:--</div>
    <div class="row"><button id="extendBtn">Stay Awake +5m</button><button id="shutdownBtn" class="btn-danger">Sleep Now</button></div>
</div>

<div class="card">
    <h2>Display Settings</h2>
    <label>Mode</label>
    <select id="displayMode">
        <option value="0">Pull from URL</option>
        <option value="1">Local SD Images</option>
    </select>

    <div id="url-config">
        <label>Pull URL</label>
        <input type="text" id="pullUrl" placeholder="http://example.com/image.bin">
        <p class="small">Image must be 800x480 raw 4-bit (2 pixels/byte).</p>
    </div>

    <label>Refresh Interval (hours)</label>
    <input type="number" id="sleepHours" min="1" max="168" value="24">
    
    <div class="row"><button id="saveConfigBtn" class="btn-success">Save & Refresh</button></div>
</div>

<div class="card" id="sd-card-section">
    <h2>SD Card Images</h2>
    <div id="library-list">Loading...</div>
    <hr style="border:0;border-top:1px solid #333;margin:20px 0">
    <label>Upload New Image (.bin)</label>
    <input type="file" id="fileInput" accept=".bin">
    <button id="uploadBtn" style="margin-top:10px;width:100%">Upload to SD</button>
</div>

<div class="card">
    <h2>Advanced</h2>
    <label>Firmware Update (.bin)</label>
    <input type="file" id="otaInput" accept=".bin">
    <button id="otaBtn" style="margin-top:10px;width:100%" class="btn-danger">Flash Firmware</button>
    <p id="otaStatus" class="small"></p>
</div>

<script>
const $=id=>document.getElementById(id);
let msLeft=0,lastTick=Date.now();

async function fetchStatus(){
    try{
        const d = await (await fetch('/status')).json();
        $('battery').textContent = `Bat: ${d.battery_percent}% (${d.battery_voltage}V)`;
        $('ip').textContent = `IP: ${d.ip}`;
        $('displayMode').value = d.mode;
        $('pullUrl').value = d.pull_url || '';
        $('sleepHours').value = d.sleep_hours || 24;
        toggleModeUI(d.mode);
    }catch(e){console.error('Status fail',e)}
}

async function fetchSession(){
    try{
        const d = await (await fetch('/session')).json();
        msLeft = d.ms_left || 0;
        lastTick = Date.now();
    }catch(e){}
}

function toggleModeUI(mode){
    $('url-config').style.display = (mode == 0) ? 'block' : 'none';
}

$('displayMode').onchange = e => toggleModeUI(e.target.value);

setInterval(()=>{
    const cur = Math.max(0, msLeft - (Date.now() - lastTick));
    const s = Math.floor(cur / 1000);
    $('session-timer').textContent = `WiFi active: ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}, 1000);

$('extendBtn').onclick = async () => { await fetch('/extend?minutes=5', {method:'POST'}); fetchSession(); };
$('shutdownBtn').onclick = async () => { if(confirm('Sleep now?')) await fetch('/shutdown'); };

$('saveConfigBtn').onclick = async () => {
    const mode = $('displayMode').value;
    const url = $('pullUrl').value.trim();
    const hours = $('sleepHours').value;

    await fetch('/config/mode', {method:'POST', body:'mode='+mode, headers:{'Content-Type':'application/x-www-form-urlencoded'}});
    await fetch('/pullurl', {method:'POST', body:'url='+encodeURIComponent(url), headers:{'Content-Type':'application/x-www-form-urlencoded'}});
    await fetch('/sleepconfig', {method:'POST', body:'hours='+hours, headers:{'Content-Type':'application/x-www-form-urlencoded'}});
    
    alert('Settings saved. Refreshing display...');
    fetchStatus();
};

async function refreshLibrary(){
    const res = await fetch('/images/list');
    const arr = res.ok ? await res.json() : [];
    const root = $('library-list');
    root.innerHTML = '';
    if(arr.length === 0) root.innerHTML = '<p class="small">No images found on SD card.</p>';
    arr.forEach(name => {
        const row = document.createElement('div');
        row.className = 'lib-item';
        row.innerHTML = `<span>${name}</span><div>
            <button onclick="showImage('${name}')" class="btn-success" style="padding:5px 10px;font-size:12px">Show</button>
            <button onclick="deleteImage('${name}')" class="btn-danger" style="padding:5px 10px;font-size:12px">Del</button>
        </div>`;
        root.appendChild(row);
    });
}

window.showImage = async (name) => {
    await fetch('/sd/select', {method:'POST', body:'name='+encodeURIComponent(name), headers:{'Content-Type':'application/x-www-form-urlencoded'}});
    alert('Showing ' + name);
};

window.deleteImage = async (name) => {
    if(confirm('Delete ' + name + '?')){
        await fetch('/images/delete', {method:'POST', body:'name='+encodeURIComponent(name), headers:{'Content-Type':'application/x-www-form-urlencoded'}});
        refreshLibrary();
    }
};

$('uploadBtn').onclick = async () => {
    const f = $('fileInput').files[0];
    if(!f) return alert('Pick a .bin file');
    const formData = new FormData();
    formData.append('file', f, f.name);
    try {
        $('uploadBtn').textContent = 'Uploading...';
        const res = await fetch('/images/upload?name=' + encodeURIComponent(f.name), {method:'POST', body:formData});
        if(res.ok) {
            alert('Uploaded');
            refreshLibrary();
        } else alert('Upload failed');
    } catch(e) { alert('Error: ' + e); }
    $('uploadBtn').textContent = 'Upload to SD';
};

$('otaBtn').onclick = async () => {
    const f = $('otaInput').files[0];
    if(!f) return alert('Pick a firmware .bin file');
    if(!confirm('This will flash new firmware and reboot. Proceed?')) return;
    
    const formData = new FormData();
    formData.append('file', f, 'update.bin');
    
    try {
        $('otaBtn').disabled = true;
        $('otaStatus').textContent = 'Uploading and flashing...';
        const res = await fetch('/update', {method:'POST', body:formData});
        const text = await res.text();
        alert(text);
        if(res.ok) window.location.reload();
    } catch(e) { 
        alert('Error: ' + e);
        $('otaStatus').textContent = 'Failed';
    } finally {
        $('otaBtn').disabled = false;
    }
};

fetchStatus(); fetchSession(); refreshLibrary();
</script>
</body></html>
