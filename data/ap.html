<!DOCTYPE html><html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>E-Paper WiFi Setup</title>
<style>
body{font-family:Arial;margin:20px;background:#1a1a2e;color:#eee}
.container{max-width:420px;margin:0 auto;padding:20px;background:#16213e;border-radius:10px}
h1{color:#e94560;text-align:center}
input{width:100%;padding:12px;margin:8px 0;box-sizing:border-box;border:2px solid #0f3460;border-radius:5px;background:#1a1a2e;color:#eee}
input[type=submit]{background:#e94560;border:none;cursor:pointer;font-size:16px}
.small{color:#9ca3af;font-size:13px}
</style></head><body>
<div class="container">
<h1>WiFi Setup</h1>
<form action="/save" method="POST">
<label>SSID</label><input type="text" name="ssid" required>
<label>Password</label><input type="password" name="password">
<input type="submit" value="Connect">
</form>
<p class="small">AP mode does not auto-sleep. Configure STA, then reboot.</p>
</div></body></html>
